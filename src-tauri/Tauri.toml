"$schema" = "https://schema.tauri.app/config/2"
identifier = "io.github.mecha-natori.id-changer"
mainBinaryName = "id-changer"
productName = "mechatronicslab-circuit-id-changer"

[[app.windows]]
height = 600
title = "基板IDチェンジャー"
width = 800

[build]
beforeBuildCommand = "pnpm build"
beforeDevCommand = "pnpm dev"
devUrl = "http://localhost:1420"
frontendDist = "../dist"

[bundle]
active = true
icon = [
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/32x32.png",
    "icons/icon.icns",
    "icons/icon.ico"
]
targets = []

[bundle.linux.deb]
depends = [
    "hicolor-icon-theme",
    "libc6",
    "libcairo2",
    "libdbus-1-3",
    "libgcc-s1",
    "libgdk-pixbuf-2.0-0",
    "libglib2.0-0",
    "libgtk-3-0",
    "libjavascriptcoregtk-4.1-0",
    "libsoup-3.0-0",
    "libwebkit2gtk-4.1-0"
]

[bundle.linux.rpm]
depends = [
    "hicolor-icon-theme",
    "libc.so.6()(64bit)",
    "libcairo.so.2()(64bit)",
    "libdbus-1.so.3()(64bit)",
    "libgdk_pixbuf-2.0.so.0()(64bit)",
    "libgio-2.0.so.0()(64bit)",
    "libglib-2.0.so.0()(64bit)",
    "libgobject-2.0.so.0()(64bit)",
    "libjavascriptcoregtk-4.1.so.0()(64bit)",
    "libm.so.6()(64bit)",
    "libsoup-3.0.so.0()(64bit)"
]

[bundle.windows.wix]
language = "ja-JP"
