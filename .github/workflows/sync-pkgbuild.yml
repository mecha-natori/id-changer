jobs:
  check:
    outputs:
      sync-needed: "${{ steps.check.outputs.sync-needed }}"
      version: "${{ steps.check.outputs.version }}"
    permissions:
      contents: "read"
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
      - name: "Install makepkg"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            --no-install-suggests \
            makepkg
      - name: "Install yq"
        run: "go install github.com/mikefarah/yq/v4@latest"
      - id: "check"
        name: "Check"
        run: |
          sync_needed=false
          expected=$(yq .package.version ./src-tauri/Cargo.toml)
          pkgbuild=$(
            grep pkgver= ./src-tauri/bundle/archlinux/PKGBUILD \
            | sed 's/^pkgver=//' \
            | cut -f1 -d' '
          )
          srcinfo=$(
            grep pkgver ./src-tauri/bundle/archlinux/.SRCINFO \
            | sed 's/^	pkgver = //'
          )
          if [[ $expected != "$pkgbuild" ]] \
          || [[ $expected != "$srcinfo" ]]; then
            sync_needed=true
          fi
          cd ./src-tauri/bundle/archlinux
          if ! diff .SRCINFO <(makepkg --printsrcinfo) &>/dev/null; then
            sync_needed=true
          fi
          echo "sync-needed=$sync_needed" >>"$GITHUB_OUTPUT"
          echo "version=$expected" >>"$GITHUB_OUTPUT"
  sync:
    if: "needs.check.outputs.sync-needed"
    needs: "check"
    permissions:
      contents: "write"
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
      - name: "Configure Git"
        run: |
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: "Install makepkg"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            --no-install-suggests \
            makepkg
      - env:
          BRANCH: >-
            ${{
              github.event_name == 'pull_request'
              && github.head_ref
              || github.ref_name
            }}
        name: "Sync"
        run: |
          ver="${{ needs.check.outputs.version }}"
          cd ./src-tauri/bundle/archlinux
          sed -i 's/^pkgver=[^ ]\+/pkgver="'"$ver"'"/' PKGBUILD
          makepkg --printsrcinfo >.SRCINFO
          git add PKGBUILD .SRCINFO
          git commit -m "chore: ArchLinux向けパッケージ定義を更新"
          git push origin "refs/heads/$BRANCH"
name: "Sync PKGBUILD"
on:
  pull_request:
  push:
  workflow_dispatch:
