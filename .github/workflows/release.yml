jobs:
  build:
    outputs:
      version: >-
        ${{
          case(
            matrix.os == 'linux' && matrix.package == 'appimage',
            steps.build-linux-appimage.outputs.version,
            matrix.os == 'linux' && matrix.package == 'archlinux',
            steps.build-linux-archlinux.outputs.version,
            matrix.os == 'linux' && matrix.package == 'deb',
            steps.build-linux-deb.outputs.version,
            matrix.os == 'linux' && matrix.package == 'rpm',
            steps.build-linux-rpm.outputs.version,
            matrix.os == 'linux' && matrix.package == 'tgz',
            steps.build-linux-tgz.outputs.version,
            matrix.os == 'macos',
            steps.build-macos.outputs.version,
            matrix.os == 'windows',
            steps.build-windows.outputs.version,
            null
          )
        }}
    permissions:
      contents: "read"
    runs-on: "${{ matrix.host }}"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
      - id: "build-linux-appimage"
        if: "matrix.os == 'linux' && matrix.package == 'appimage'"
        name: "Build"
        uses: "./.github/actions/build-linux-appimage"
      - id: "build-linux-archlinux"
        if: "matrix.os == 'linux' && matrix.package == 'archlinux'"
        name: "Build"
        uses: "./.github/actions/build-linux-archlinux"
      - id: "build-linux-deb"
        if: "matrix.os == 'linux' && matrix.package == 'deb'"
        name: "Build"
        uses: "./.github/actions/build-linux-deb"
      - id: "build-linux-rpm"
        if: "matrix.os == 'linux' && matrix.package == 'rpm'"
        name: "Build"
        uses: "./.github/actions/build-linux-rpm"
      - id: "build-linux-tgz"
        if: "matrix.os == 'linux' && matrix.package == 'tgz'"
        name: "Build"
        uses: "./.github/actions/build-linux-tgz"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
      - id: "build-macos"
        if: "matrix.os == 'macos'"
        name: "Build"
        uses: "./.github/actions/build-macos"
      - id: "build-windows"
        if: "matrix.os == 'windows'"
        name: "Build"
        uses: "./.github/actions/build-windows"
      - name: "Upload artifact"
        uses: "actions/upload-artifact@v7"
        with:
          name: "id-changer"
          path: >-
            ${{
              case(
                matrix.os == 'linux' && matrix.package == 'appimage',
                steps.build-linux-appimage.outputs.version,
                matrix.os == 'linux' && matrix.package == 'archlinux',
                steps.build-linux-archlinux.outputs.version,
                matrix.os == 'linux' && matrix.package == 'deb',
                steps.build-linux-deb.outputs.version,
                matrix.os == 'linux' && matrix.package == 'rpm',
                steps.build-linux-rpm.outputs.version,
                matrix.os == 'linux' && matrix.package == 'tgz',
                steps.build-linux-tgz.outputs.version,
                matrix.os == 'macos',
                steps.build-macos.outputs.out-path,
                matrix.os == 'windows',
                steps.build-windows.outputs.out-path,
                null
              )
            }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: "ubuntu-24.04"
            os: "linux"
            package: "appimage"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "archlinux"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "deb"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "rpm"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "tgz"
          - host: "macos-26"
            os: "macos"
          - host: "windows-2025-vs2026"
            os: "windows"
        os:
          - "linux"
          - "macos"
          - "windows"
  release:
    needs: "build"
    permissions:
      contents: "write"
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
      - name: "Get artifacts"
        uses: "actions/download-artifact@v8"
        with:
          merge-multiple: true
          path: "./out"
      - name: "Configure Git"
        run: |
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - id: "description"
        name: "Prepare release description"
        run: |
          d=$(cat RELEASE.md)
          d=${d//'%'/'%25'}
          d=${d//$'\n'/'%0A'}
          d=${d//$'\r'/'%0D'}
          echo "description=$d" >>"$GITHUB_OUTPUT"
      - name: "Create release"
        uses: "svenstaro/upload-release-action@v2"
        with:
          body: "${{ steps.description.outputs.description }}"
          file: "./out/*"
          file_glob: true
          release_name: "基板IDチェンジャー v${{ needs.build.outputs.version }}"
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.build.outputs.version }}"
name: "Build and Release"
on:
  workflow_dispatch:
