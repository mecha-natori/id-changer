jobs:
  build:
    permissions:
      contents: "read"
    runs-on: "${{ matrix.host }}"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
      - if: "matrix.os == 'linux' && matrix.package == 'appimage'"
        name: "Build"
        uses: "./.github/actions/build-linux-appimage"
      - if: "matrix.os == 'linux' && matrix.package == 'archlinux'"
        name: "Build"
        uses: "./.github/actions/build-linux-archlinux"
      - if: "matrix.os == 'linux' && matrix.package == 'deb'"
        name: "Build"
        uses: "./.github/actions/build-linux-deb"
      - if: "matrix.os == 'linux' && matrix.package == 'rpm'"
        name: "Build"
        uses: "./.github/actions/build-linux-rpm"
      - if: "matrix.os == 'linux' && matrix.package == 'tgz'"
        name: "Build"
        uses: "./.github/actions/build-linux-tgz"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
      - if: "matrix.os == 'macos'"
        name: "Build"
        uses: "./.github/actions/build-macos"
      - if: "matrix.os == 'windows'"
        name: "Build"
        uses: "./.github/actions/build-windows"
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: "ubuntu-24.04"
            os: "linux"
            package: "appimage"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "archlinux"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "deb"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "rpm"
          - host: "ubuntu-24.04"
            os: "linux"
            package: "tgz"
          - host: "macos-26"
            os: "macos"
          - host: "windows-2025-vs2026"
            os: "windows"
        os:
          - "linux"
          - "macos"
          - "windows"
name: "Build"
on:
  pull_request:
  push:
  workflow_dispatch:
