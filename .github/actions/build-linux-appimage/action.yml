description: "Builds the id-checker project for Linux AppImage"
name: "Build for Linux AppImage"
outputs:
  out-path:
    description: "Output file path"
    value: "${{ steps.build.outputs.out-path }}"
  version:
    description: "App version"
    value: "${{ steps.version.outputs.value }}"
runs:
  steps:
    - name: "Install pnpm"
      uses: "pnpm/action-setup@v6"
    - name: "Setup Node.js"
      uses: "actions/setup-node@v6"
      with:
        cache: "pnpm"
        node-version: 26
    - name: "Setup latest Rust toolchain"
      uses: "dtolnay/rust-toolchain@nightly"
      with:
        targets: "x86_64-unknown-linux-gnu"
    - name: "Install frontend dependencies"
      shell: "bash"
      run: "pnpm ci"
    - name: "Install backend dependencies"
      shell: "bash"
      run: "cargo fetch"
    - id: "product-name"
      name: "Get product name"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "productName"
        file: "src-tauri/Tauri.toml"
    - id: "version"
      name: "Get version"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "package.version"
        file: "src-tauri/Cargo.toml"
    - id: "build"
      name: "Build"
      shell: "bash"
      run: |
        pnpm tauri build -b appimage
        dir=$PWD/target/release/bundle/appimage
        name="${{ steps.product-name.outputs.value }}"
        ver="${{ steps.version.outputs.value }}"
        fullname=${name}_${ver}_amd64
        if [[ ! -f $dir/$fullname.AppImage ]]; then
          printf "\e[1;31mError: installer file name is wrong\e[m\n"
          printf "  expected: \e[33m$dir/$fullname.AppImage\e[m\n"
          printf "  found: \e[33m$dir/"*".AppImage\e[m\n"
          exit 1
        fi
        mkdir out
        mv "$dir/$fullname.AppImage" "$GITHUB_WORKSPACE/out/$fullname.AppImage"
        echo "out-path=./out/$fullname.AppImage" >>"$GITHUB_OUTPUT"
  using: "composite"
