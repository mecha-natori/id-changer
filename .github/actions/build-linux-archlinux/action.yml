description: "Builds the id-checker project for Archlinux"
name: "Build for Archlinux"
outputs:
  out-path:
    description: "Output file path"
    value: "${{ steps.build.outputs.pkgfile0 }}"
  version:
    description: "App version"
    value: "${{ steps.version.outputs.value }}"
runs:
  steps:
    - env:
        GPG_PRIVATE_KEY: "${{ secrets.GPG_PRIVATE_KEY }}"
        GPG_PRIVATE_KEY_PASSPHRASE: "${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}"
        GPG_SIGN_KEY_KEYGRIP: "${{ vars.GPG_SIGN_KEY_KEYGRIP }}"
      name: "Import GPG key"
      shell: "bash"
      run: |
        gpg \
          --batch \
          --import \
          --no-tty \
          --passphrase-fd 3 \
          --pinentry-mode loopback \
          --yes \
          <<<"$GPG_PRIVATE_KEY" \
          3<<<"$GPG_PRIVATE_KEY_PASSPHRASE"
        printf "allow-preset-passphrase\n" >>"$HOME/.gnupg/gpg-agent.conf"
        gpgconf --kill gpg-agent
        gpg-connect-agent /bye >/dev/null
        printf "%s\n" "$GPG_PRIVATE_KEY_PASSPHRASE" \
        | /usr/lib/gnupg/gpg-preset-passphrase --preset "$GPG_SIGN_KEY_KEYGRIP"
    - id: "product-name"
      name: "Get product name"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "productName"
        file: "src-tauri/Tauri.toml"
    - id: "version"
      name: "Get version"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "package.version"
        file: "src-tauri/Cargo.toml"
    - id: "build"
      name: "Build"
      uses: "edlanglois/pkgbuild-action@v1"
      with:
        makepkgArgs: >-
          --config makepkg.conf
          --key "${{ vars.GPG_SIGN_KEY }}"
          --sign
        pkgdir: "src-tauri/bundle/archlinux"
  using: "composite"
