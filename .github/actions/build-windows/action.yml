description: "Builds the id-checker project for Windows"
name: "Build for Windows"
outputs:
  out-path:
    description: "Output file path"
    value: "${{ steps.build.outputs.out-path }}"
  version:
    description: "App version"
    value: "${{ steps.version.outputs.value }}"
runs:
  steps:
    - name: "Install pnpm"
      uses: "pnpm/action-setup@v6"
    - name: "Setup Node.js"
      uses: "actions/setup-node@v6"
      with:
        cache: "pnpm"
        node-version: 26
    - name: "Setup latest Rust toolchain"
      uses: "dtolnay/rust-toolchain@nightly"
      with:
        targets: "x86_64-pc-windows-msvc"
    - name: "Install frontend dependencies"
      shell: "bash"
      run: "pnpm ci"
    - name: "Install backend dependencies"
      shell: "bash"
      run: "cargo fetch"
    - id: "product-name"
      name: "Get product name"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "productName"
        file: "src-tauri/Tauri.toml"
    - id: "version"
      name: "Get version"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "package.version"
        file: "src-tauri/Cargo.toml"
    - id: "build"
      name: "Build"
      shell: "bash"
      run: |
        pnpm tauri build -b msi
        dir=$PWD/target/release/bundle/msi
        name="${{ steps.product-name.outputs.value }}"
        ver="${{ steps.version.outputs.value }}"
        fullname=${name}_${ver}_x64_ja-JP
        if [[ ! -f $dir/$fullname.msi ]]; then
          file=$(find "$dir" -type f -name '*.msi')
          printf "\e[1;31mError: installer file name is wrong\e[m\n"
          printf "  expected: \e[33m%s/%s.msi\e[m\n" "$dir" "$fullname"
          printf "  found: \e[33m%s\e[m\n" "$file"
          exit 1
        fi
        mkdir out
        mv "$dir/$fullname.msi" "$GITHUB_WORKSPACE/out/$fullname.msi"
        echo "out-path=./out/$fullname.msi" >>"$GITHUB_OUTPUT"
  using: "composite"
