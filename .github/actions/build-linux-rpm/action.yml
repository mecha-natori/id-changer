description: "Builds the id-checker project for RedHat Enterprise Linux family"
name: "Build for RedHat Enterprise Linux family"
outputs:
  out-path:
    description: "Output file path"
    value: "${{ steps.build.outputs.out-path }}"
  version:
    description: "App version"
    value: "${{ steps.version.outputs.value }}"
runs:
  steps:
    - name: "Install Tauri dependencies"
      shell: "bash"
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends --no-install-suggests \
          libappindicator3-dev \
          libgtk-3-dev \
          librsvg2-dev \
          libwebkit2gtk-4.1-dev \
          mold
    - name: "Install pnpm"
      uses: "pnpm/action-setup@v6"
    - name: "Setup Node.js"
      uses: "actions/setup-node@v6"
      with:
        cache: "pnpm"
        node-version: 26
    - name: "Setup latest Rust toolchain"
      uses: "dtolnay/rust-toolchain@nightly"
      with:
        targets: "x86_64-unknown-linux-gnu"
    - name: "Install frontend dependencies"
      shell: "bash"
      run: "pnpm ci"
    - name: "Install backend dependencies"
      shell: "bash"
      run: "cargo fetch"
    - id: "product-name"
      name: "Get product name"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "productName"
        file: "src-tauri/Tauri.toml"
    - id: "version"
      name: "Get version"
      uses: "SebRollen/toml-action@v1.2.0"
      with:
        field: "package.version"
        file: "src-tauri/Cargo.toml"
    - env:
        RUSTFLAGS: "-Clink-arg=-fuse-ld=mold"
        TAURI_SIGNING_RPM_KEY: "${{ secrets.GPG_PRIVATE_KEY }}"
        TAURI_SIGNING_RPM_KEY_PASSPHRASE: >-
          ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}
      id: "build"
      name: "Build"
      shell: "bash"
      run: |
        pnpm tauri build -b rpm
        dir=$PWD/target/release/bundle/rpm
        name="${{ steps.product-name.outputs.value }}"
        ver="${{ steps.version.outputs.value }}"
        fullname=${name}-${ver}-1.x86_64
        if [[ ! -f $dir/$fullname.rpm ]]; then
          file=$(find "$dir" -type f -name '*.rpm')
          printf "\e[1;31mError: installer file name is wrong\e[m\n"
          printf "  expected: \e[33m%s/%s.rpm\e[m\n" "$dir" "$fullname"
          printf "  found: \e[33m%s\e[m\n" "$file"
          exit 1
        fi
        mkdir out
        mv "$dir/$fullname.rpm" "$GITHUB_WORKSPACE/out/$fullname.rpm"
        echo "out-path=./out/$fullname.rpm" >>"$GITHUB_OUTPUT"
  using: "composite"
